name: Build Docker Image on Push

on:
  push:
    branches:
      - waninter
    paths:
      - "common/**"
      - "constant/**"
      - "controller/**"
      - "dto/**"
      - "i18n/**"
      - "logger/**"
      - "middleware/**"
      - "model/**"
      - "oauth/**"
      - "pkg/**"
      - "relay/**"
      - "router/**"
      - "service/**"
      - "setting/**"
      - "types/**"
      - "web/**"
      - "main.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "VERSION"
      - ".dockerignore"
      - ".github/workflows/build-image-on-push.yml"

concurrency:
  group: build-image-on-push-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/waninter/new-api
  IMAGE_TAG: waninter

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image version
        run: |
          set -eu
          printf '%s\n' "${IMAGE_TAG}" > VERSION

      - name: Extract metadata labels
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha,scope=new-api-push
          cache-to: type=gha,scope=new-api-push,mode=max
          provenance: false
          sbom: false

      - name: Print image refs
        run: |
          set -eu
          echo "Image tag: ${{ env.IMAGE_TAG }}"
          echo "Image tags:"
          printf '%s\n' '${{ steps.docker_meta.outputs.tags }}'
          echo "Digest: ${{ steps.build.outputs.digest }}"
